name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests (core logic)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      # Swift Testing (used by the test target) requires the Swift 6 toolchain.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Swift version
        run: swift --version
      # `swift test` compiles only ZwispCore + its tests, not the executable,
      # so this stays fast and does not pull in WhisperKit/CoreML.
      - name: Run tests
        run: swift test

  build:
    name: Build app (release)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Build
        run: swift build -c release
